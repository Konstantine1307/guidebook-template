<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c5a880" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Attractions | Property Guidebook</title>
    <meta name="description" content="Local attractions and things to do." />
    <link
      rel="preload"
      href="/topography-orange.svg"
      as="image"
      type="image/svg+xml"
    />
  </head>
  <body class="bg-attractions">
    <guide-drawer></guide-drawer>
    <guide-navbar title="Attractions"></guide-navbar>

    <div class="page-wrapper">
      <div
        id="page-content"
        style="width: 100%; max-width: 64rem; padding: 0 1rem"
      ></div>
    </div>

    <div class="pwa-toast" id="pwa-toast" role="status" aria-live="polite">
      <span id="pwa-toast-msg"></span>
      <div class="pwa-toast-actions">
        <button class="btn-reload" id="pwa-btn-reload">Refresh</button>
        <button class="btn-dismiss" id="pwa-btn-dismiss">Dismiss</button>
      </div>
    </div>

    <script type="module" src="/scripts/attractions.ts"></script>
  </body>
</html>
