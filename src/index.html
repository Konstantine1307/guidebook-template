<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c5a880" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Welcome | Property Guidebook</title>
    <meta name="description" content="Welcome to your property guidebook." />
  </head>
  <body>
    <guide-drawer></guide-drawer>
    <guide-navbar title="Guidebooks"></guide-navbar>

    <div class="pwa-toast" id="pwa-toast" role="status" aria-live="polite">

      <div class="pwa-toast-actions">

      </div>
    </div>

    <script type="module" src="/scripts/index.ts"></script>
