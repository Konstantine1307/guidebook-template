<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c5a880" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Guidebook</title>
    <meta name="description" content="Your complete property guidebook." />

    <!-- Preload all topography patterns since any route could need them -->
    <link
      rel="preload"
      href="/topography.svg"
      as="image"
      type="image/svg+xml"
    />
    <link
      rel="preload"
      href="/topography-cyan.svg"
      as="image"
      type="image/svg+xml"
    />
    <link
      rel="preload"
      href="/topography-blue.svg"
      as="image"
      type="image/svg+xml"
    />
    <link
      rel="preload"
      href="/topography-orange.svg"
      as="image"
      type="image/svg+xml"
    />
    <link
      rel="preload"
      href="/topography-light.svg"
      as="image"
      type="image/svg+xml"
    />
  </head>
  <body class="bg-manual">
    <guide-drawer></guide-drawer>
    <guide-navbar title="Guidebook"></guide-navbar>

    <div class="page-wrapper">
      <div id="page-content">
        <!-- Content injected by router -->
      </div>
    </div>

    <div class="pwa-toast" id="pwa-toast" role="status" aria-live="polite">
      <span id="pwa-toast-msg"></span>
      <div class="pwa-toast-actions">
        <button class="btn-reload" id="pwa-btn-reload">Refresh</button>
        <button class="btn-dismiss" id="pwa-btn-dismiss">Dismiss</button>
      </div>
    </div>

    <script type="module" src="/scripts/main.ts"></script>
  </body>
</html>
